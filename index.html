<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aditya's FlashChat</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chat-wrapper {
    display: flex;
    flex-direction: column;
    width: 90%;
    max-width: 960px;
    height: 100%;
    background: #fff;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    border-radius: 8px;
    overflow: hidden;
  }

  .controls {
    padding: 15px;
    background: #e9e9e9;
    border-bottom: 1px solid #ccc;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .controls input,
  .controls select,
  .controls button {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    flex: 1;
    min-width: 120px;
  }

  .main-chat {
    display: flex;
    flex: 1;
    flex-direction: row;
    min-height: 0; /* ensures children can shrink on smaller screens */
  }

  .sidebar {
    width: 30%;
    background: #f7f7f7;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .sidebar h3 {
    margin: 0;
    padding: 15px;
    background: #e0e0e0;
    border-bottom: 1px solid #ccc;
  }

  .user-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    min-height: 0;
  }

  .user-item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #ddd;
  }

  .user-item:hover { background: #eee; }

  /* IMPORTANT: allow the chat-panel children to size correctly (fixes scrolling collapse) */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f4f4f4;
    position: relative;   /* for absolutely-positioned buttons inside */
    min-height: 0;        /* <- critical for flex overflow to work correctly */
  }

  .chat-header {
    padding: 10px 15px;
    background: #e9e9e9;
    border-bottom: 1px solid #ccc;
  }

  /* The actual scrolling area */
  .chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth; /* smooth scroll when jumping */
    min-height: 0;           /* <- critical */
    -webkit-overflow-scrolling: touch; /* momentum scrolling on iOS */
    align-items: flex-start;
  }

  .chat-body::-webkit-scrollbar {
    width: 8px;
  }
  .chat-body::-webkit-scrollbar-track {
    background: transparent;
  }
  .chat-body::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.12);
    border-radius: 6px;
  }
  .chat-body::-webkit-scrollbar-thumb:hover {
    background: rgba(0,0,0,0.18);
  }

  .message {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
    word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    line-height: 1.3;
  }

  .message.me {
    background: #dcf8c6;
    align-self: flex-end;
  }
  .message.other {
    background: #fff;
    align-self: flex-start;
  }

  /* Media handling inside messages */
  .message img,
  .message video {
    display: block;
    max-width: 320px;      /* preview max width */
    width: auto;
    height: auto;
    border-radius: 8px;
    margin-top: 8px;
  }

  .message audio {
    display: block;
    margin-top: 8px;
  }

  /* footer should not grow; keep it fixed at bottom of chat-panel */
  .chat-footer {
    padding: 10px 15px;
    border-top: 1px solid #ccc;
    display: flex;
    gap: 10px;
    align-items: center;
    flex: none; /* ensure footer doesn't stretch */
    background: #fff;
  }

  .chat-footer input[type="text"] {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 20px;
  }

  .chat-footer button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #007bff;
    color: #fff;
    cursor: pointer;
  }

  .chat-footer input[type="file"] {
    display: none;
  }

  .file-label {
    background: #007bff;
    color: #fff;
    padding: 10px 15px;
    border-radius: 20px;
    cursor: pointer;
  }

  /* Floating scroll-to-bottom button (positioned relative to .chat-panel) */
  #scrollToBottom {
    position: absolute;
    right: 20px;
    bottom: 82px; /* sits above the footer */
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    z-index: 50;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* small screens adjustments */
  @media (max-width: 768px) {
    .main-chat { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
    .chat-footer { flex-direction: column; gap: 8px; }
    .controls { flex-direction: column; align-items: stretch; }
    .controls input, .controls select, .controls button { flex: none; width: 100%; }
    .message img, .message video { max-width: 80%; }
    #scrollToBottom { right: 12px; bottom: 120px; }
  }
</style>

</head>
<body>
  <div class="chat-wrapper">
    <div class="controls">
      <select id="chatMode" onchange="updateButtons()">
        <option value="group">Group Chat</option>
        <option value="private">Private Chat</option>
      </select>
      <input type="text" id="username" placeholder="Enter your name" />
      <input type="text" id="groupCode" placeholder="Enter code" />
      <button onclick="generateCode()">Generate Code</button>
      <button id="startButton" onclick="startHost()">Host</button>
      <button id="joinButton" onclick="joinGroup()">Join</button>
    </div>
    <div class="main-chat">
      <div class="sidebar">
        <h3>Users</h3>
        <div class="user-list" id="userList"></div>
      </div>
      <div class="chat-panel">
        <div class="chat-header"><strong id="chatTitle">FlashChat</strong></div>
        <div class="chat-body" id="log"></div>
        <button id="scrollToBottom">↓</button>
        <div class="chat-footer">
          <input id="message" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()" />
          <input type="file" id="fileInput" />
          <label for="fileInput" class="file-label">file</label>
          <button onclick="send()">Send</button>
        </div>
      </div>
    </div>
  </div>

<script>
let peer, connections = {}, connToHost = null;
let isHost = false, userId = null;
let username = "Anonymous";
let userNames = {};
let hostId = null;

// ================= HOST CHECK =================
function checkHostExists(code, callback) {
  const temp = new Peer();

  temp.on('open', () => {
    const conn = temp.connect(code);
    let done = false;

    conn.on('open', () => {
      done = true;
      conn.close();
      temp.destroy();
      callback(true);
    });

    setTimeout(() => {
      if (!done) {
        temp.destroy();
        callback(false);
      }
    }, 1500);
  });
}

// ================= HOST =================
function startHost() {
  username = document.getElementById('username').value || "Host";
  const code = document.getElementById('groupCode').value;

  if (!code) return alert("Enter code");

  checkHostExists(code, exists => {
    if (exists) return alert("Chat already exists. Join instead.");

    isHost = true;
    userId = code;
    hostId = code;

    peer = new Peer(code);
    userNames[userId] = username;

    peer.on('connection', conn => {

      connections[conn.peer] = conn;

      conn.on('data', data => {

        // 🔥 JOIN REQUEST
        if (data.type === "joinRequest") {

          const allow = confirm(`${data.name} wants to join`);

          if (!allow) {
            conn.send({ type: "rejected" });
            conn.close();
            return;
          }

          userNames[conn.peer] = data.name;

          conn.send({
            type: "accepted",
            users: userNames,
            hostId: hostId
          });

          broadcastUsers();
          updateUserList();
          logSystem(data.name + " joined");

          return;
        }

        // NORMAL MESSAGE
        handleIncoming(conn.peer, data);
      });

      conn.on('close', () => {
        if (userNames[conn.peer]) {
          logSystem(userNames[conn.peer] + " left");
        }

        delete connections[conn.peer];
        delete userNames[conn.peer];

        updateUserList();
        broadcastUsers();
      });
    });
  });
}

// ================= JOIN =================
function joinGroup() {
  username = document.getElementById('username').value || "User";
  const code = document.getElementById('groupCode').value;

  if (!code) return alert("Enter code");

  checkHostExists(code, exists => {

    if (!exists) return alert("Chat not started");

    userId = "user_" + Math.random().toString(36).slice(2, 8);
    peer = new Peer(userId);

    peer.on('open', () => {
      connToHost = peer.connect(code);

      connToHost.on('open', () => {
        connToHost.send({
          type: "joinRequest",
          name: username
        });
      });

      connToHost.on('data', data => {

        if (data.type === "rejected") {
          alert("Host rejected you");
          connToHost.close();
          return;
        }

        if (data.type === "accepted") {
          userNames = data.users;
          hostId = data.hostId;

          userNames[userId] = username;

          updateUserList();
          logSystem("Joined chat");
          return;
        }

        if (data.type === "userList") {
          userNames = data.users;
          updateUserList();
          return;
        }

        displayData(data);
      });
    });
  });
}

// ================= SEND =================
function send() {
  const msg = document.getElementById('message').value;
  if (!msg) return;

  const data = {
    type: "text",
    text: msg,
    name: username
  };

  if (isHost) {
    displayData(data);
    for (let id in connections) connections[id].send(data);
  } else {
    connToHost.send(data);
    displayData(data);
  }

  document.getElementById('message').value = '';
}

// ================= BROADCAST =================
function broadcastUsers() {
  const data = {
    type: "userList",
    users: userNames
  };

  for (let id in connections) {
    connections[id].send(data);
  }
}

// ================= HANDLE =================
function handleIncoming(sender, data) {
  displayData(data);

  if (isHost) {
    for (let id in connections) {
      if (id !== sender) {
        connections[id].send(data);
      }
    }
  }
}

// ================= DISPLAY =================
function displayData(data) {
  if (data.type === "text") {
    logMessage(data.name, data.text);
  }
}

// ================= UI =================
function logMessage(name, text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');

  div.textContent = `${name}: ${text}`;
  log.appendChild(div);
}

function logSystem(text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');

  div.style.color = "gray";
  div.textContent = text;
  log.appendChild(div);
}

// ================= USERS =================
function updateUserList() {
  const list = document.getElementById('userList');
  list.innerHTML = "";

  for (let id in userNames) {
    const div = document.createElement('div');

    let name = userNames[id];

    if (id === userId) name += " (You)";
    if (id === hostId) name += " 👑";

    // KICK
    if (isHost && id !== hostId) {
      div.style.cursor = "pointer";
      div.onclick = () => kickUser(id);
    }

    div.textContent = name;
    list.appendChild(div);
  }
}

// ================= KICK =================
function kickUser(id) {
  if (!connections[id]) return;

  connections[id].send({ type: "rejected" });
  connections[id].close();
}
</script>
